name = "deribit-rl-bot"
main = "bot.js"
compatibility_date = "2024-01-01"
workers_dev = true

# 24/7 scheduled execution
[[ triggers.crons ]]
cron = "*/5 * * * *"  # Every 5 minutes

# KV namespace for state persistence
[[kv_namespaces]]
binding = "RL_STATE"
id = "your-kv-id-here"

# Environment variables
vars = { ASSETS = "BTC,ETH", DCA_THRESHOLD = "0.05", CONFIDENCE_MIN = "0.80" }

# Secrets (set via wrangler secret put)
# TELEGRAM_TOKEN
# TELEGRAM_CHAT_ID
